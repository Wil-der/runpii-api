framework:
    messenger:
        failure_transport: failed
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: messages
                    group: messages_group
                    consumer:
                        receive: true
            sync: 'sync://'
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\*: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
